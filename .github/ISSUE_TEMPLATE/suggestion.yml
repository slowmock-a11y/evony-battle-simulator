name: Suggestion
description: Suggest a new feature, improvement, or mechanic to add
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Describe your idea or suggestion.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why would this be useful?
      description: How would this help you or other players?
    validations:
      required: false
